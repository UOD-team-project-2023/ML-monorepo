version: 1
formatters:
  simple:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: '%d-%b-%y %H:%M:%S'
handlers:
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: simple
    level: DEBUG
    filename: logs/log.txt
    maxBytes: 1048576 # 1 MB
    backupCount: 5 # keep up to 5 log files
root:
  level: DEBUG
  handlers: [file]
